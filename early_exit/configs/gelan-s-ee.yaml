# AnytimeYOLO — GELAN-s with 5 early exit detection heads (full paper architecture)
# Based on gelan-s.yaml, backbone unchanged. 5 multi-scale DDetect heads at
# progressively deeper FPN computation stages = 15 sub-exits total
# (5 main exits × 3 scales/sub-exits per exit, per paper §3-4).
#
# Layer topology identical to gelan-m-ee (same indices, same exit refs);
# only channel widths shrink per gelan-s.
#
# Computation depth (max layer that must execute before exit fires):
#   Exit 0 [4, 6, 8]    — layer 8   — backbone only, no FPN
#   Exit 1 [4, 6, 9]    — layer 9   — + SPPELAN on P5
#   Exit 2 [15, 12, 9]  — layer 15  — + top-down FPN (P3 final, P4 partial)
#   Exit 3 [15, 18, 9]  — layer 18  — + P4 bottom-up
#   Exit 4 [15, 18, 21] — layer 21  — full FPN (final)
#
# Use with EarlyExitModel + EarlyExitLoss (early_exit/model.py, early_exit/loss.py)

nc: 80
depth_multiple: 1.0
width_multiple: 1.0

anchors: 3

backbone:
  [
   [-1, 1, Conv, [32, 3, 2]],                # 0-P1/2
   [-1, 1, Conv, [64, 3, 2]],                # 1-P2/4
   [-1, 1, ELAN1, [64, 64, 32]],             # 2
   [-1, 1, AConv, [128]],                    # 3-P3/8
   [-1, 1, RepNCSPELAN4, [128, 128, 64, 3]], # 4  ← E0/E1 P3 (128ch)
   [-1, 1, AConv, [192]],                    # 5-P4/16
   [-1, 1, RepNCSPELAN4, [192, 192, 96, 3]], # 6  ← E0/E1 P4 (192ch)
   [-1, 1, AConv, [256]],                    # 7-P5/32
   [-1, 1, RepNCSPELAN4, [256, 256, 128, 3]], # 8  ← E0 P5 (256ch)
  ]

head:
  [
   [-1, 1, SPPELAN, [256, 128]],             # 9   ← E1/E2/E3 P5 (256ch)

   [-1, 1, nn.Upsample, [None, 2, 'nearest']],
   [[-1, 6], 1, Concat, [1]],                # 11 cat backbone P4

   [-1, 1, RepNCSPELAN4, [192, 192, 96, 3]], # 12  ← E2 P4 (192ch)

   [-1, 1, nn.Upsample, [None, 2, 'nearest']],
   [[-1, 4], 1, Concat, [1]],                # 14 cat backbone P3

   [-1, 1, RepNCSPELAN4, [128, 128, 64, 3]], # 15  ← E2/E3/E4 P3 (128ch)

   [-1, 1, AConv, [96]],
   [[-1, 12], 1, Concat, [1]],               # 17 cat head P4

   [-1, 1, RepNCSPELAN4, [192, 192, 96, 3]], # 18  ← E3/E4 P4 (192ch)

   [-1, 1, AConv, [128]],
   [[-1, 9], 1, Concat, [1]],                # 20 cat head P5

   [-1, 1, RepNCSPELAN4, [256, 256, 128, 3]], # 21  ← E4 P5 (256ch)

   # --- early exit heads (multi-scale DDetect, 3 sub-exits each) ---
   [[4,  6,  8],  1, DDetect, [nc]],         # 22  E0: backbone only
   [[4,  6,  9],  1, DDetect, [nc]],         # 23  E1: + SPPELAN
   [[15, 12, 9],  1, DDetect, [nc]],         # 24  E2: + top-down FPN
   [[15, 18, 9],  1, DDetect, [nc]],         # 25  E3: + P4 bottom-up
   [[15, 18, 21], 1, DDetect, [nc]],         # 26  E4: full FPN (final)
  ]
